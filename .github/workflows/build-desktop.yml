name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows packages (NSIS + Portable)
        shell: pwsh
        run: |
          pnpm run build
          pnpm exec electron-builder --win --x64 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litelauncher-windows-x64
          if-no-files-found: error
          retention-days: 14
          path: |
            release/*.exe
            release/*.zip
            release/*.blockmap
            release/latest.yml

  build-macos-arm64:
    name: macOS arm64 (Apple Silicon)
    runs-on: macos-14
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS arm64 packages
        run: |
          pnpm run build
          pnpm exec electron-builder --mac dmg zip --arm64 --publish never

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litelauncher-macos-arm64
          if-no-files-found: error
          retention-days: 14
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml

  build-macos-intel:
    name: macOS x64 (build on macOS 14, target macOS 12)
    runs-on: macos-14
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS x64 packages
        run: |
          pnpm run build
          pnpm exec electron-builder --mac dmg zip --x64 --publish never

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litelauncher-macos-x64-macos12
          if-no-files-found: error
          retention-days: 14
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml

  publish-release:
    name: Publish GitHub Release Assets
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-macos-arm64
      - build-macos-intel
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: litelauncher-windows-x64
          path: artifacts/windows

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: litelauncher-macos-arm64
          path: artifacts/macos-arm64

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: litelauncher-macos-x64-macos12
          path: artifacts/macos-x64

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/release

          cp -v artifacts/windows/*.exe artifacts/release/ || true
          cp -v artifacts/windows/*.zip artifacts/release/ || true
          cp -v artifacts/windows/*.blockmap artifacts/release/ || true
          cp -v artifacts/windows/latest.yml artifacts/release/ || true

          cp -v artifacts/macos-arm64/*.dmg artifacts/release/ || true
          cp -v artifacts/macos-arm64/*.zip artifacts/release/ || true
          cp -v artifacts/macos-arm64/*.blockmap artifacts/release/ || true

          # Skip latest-mac.yml here because arm64/x64 jobs produce the same filename.
          cp -v artifacts/macos-x64/*.dmg artifacts/release/ || true
          cp -v artifacts/macos-x64/*.zip artifacts/release/ || true
          cp -v artifacts/macos-x64/*.blockmap artifacts/release/ || true

          ls -la artifacts/release

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${GITHUB_REF_NAME}" artifacts/release/* --clobber
