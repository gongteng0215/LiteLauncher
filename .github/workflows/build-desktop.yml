name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows packages (NSIS + Portable)
        shell: pwsh
        run: |
          pnpm run build
          pnpm exec electron-builder --win --x64 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litelauncher-windows-x64
          if-no-files-found: error
          retention-days: 14
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

  build-macos-arm64:
    name: macOS arm64 (Apple Silicon)
    runs-on: macos-14
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS arm64 packages
        run: |
          pnpm run build
          pnpm exec electron-builder --mac dmg zip --arm64 --publish never

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litelauncher-macos-arm64
          if-no-files-found: error
          retention-days: 14
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml

  build-macos-intel:
    name: macOS x64 (Intel, macOS 12 compatible)
    runs-on: macos-12
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS x64 packages
        run: |
          pnpm run build
          pnpm exec electron-builder --mac dmg zip --x64 --publish never

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litelauncher-macos-x64-macos12
          if-no-files-found: error
          retention-days: 14
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
