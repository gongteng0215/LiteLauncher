<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'nonce-litelauncher-probe'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>LiteLauncher</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div class="header-row">
          <input
            id="search-input"
            class="search-input"
            type="text"
            placeholder="搜索应用，支持 app:/cmd:/web:/plugin: 范围前缀"
            autocomplete="off"
            spellcheck="false"
          />
          <button
            id="settings-shortcut-btn"
            class="header-toolbar-btn"
            type="button"
            aria-label="打开设置"
            title="设置"
          >
            设置
          </button>
        </div>
      </header>
      <section class="results">
        <div id="results-loading" class="results-loading" hidden>
          <span class="results-loading-spinner" aria-hidden="true"></span>
          <span id="results-loading-text" class="results-loading-text">正在检索...</span>
        </div>
        <ul id="result-list" class="result-list"></ul>
      </section>
      <footer class="footer">
        <div id="status-text" class="status-text">启动中...</div>
        <div id="hint-text" class="hint-text">Enter 执行 - Esc 清空/隐藏 - 方向键移动 - 支持 app:/cmd:/web:/plugin:</div>
      </footer>
    </main>
    <script nonce="litelauncher-probe">
      window.__LL_RENDERER_BOOTSTRAPPED__ = false;
      setTimeout(function () {
        if (window.__LL_RENDERER_BOOTSTRAPPED__) {
          return;
        }

        var status = document.getElementById("status-text");
        if (!status) {
          return;
        }

        status.textContent =
          "渲染脚本未启动，请先彻底退出 LiteLauncher 后再执行 pnpm start";
      }, 1500);
    </script>
    <script src="./plugin-constants.js"></script>
    <script src="./plugin-static-data.js"></script>
    <script src="./plugin-handler-config.js"></script>
    <script src="./plugin-panel-impls.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
